name: "Chromatic"

on: push

jobs:
  playwright:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
      - name: Install dependencies
        run: npm ci
      - name: Run Playwright tests
        run: npx playwright test --project=chromium --retries=0
        env:
          HOME: /root
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: ./test-results
          retention-days: 30
  chromatic:
    name: Run Chromatic
    needs: playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
      - name: Install dependencies
        run: npm ci
      - name: Download Playwright test results
        uses: actions/download-artifact@v8
        with:
          name: test-results
          path: ./test-results
      - name: Build archive Storybook
        run: npm exec build-archive-storybook -- --output-dir=storybook-archive
        env:
          CI: "false"
          CHROMATIC_ARCHIVE_LOCATION: ./test-results
      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          playwright: true
          storybookBuildDir: storybook-archive
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        env:
          CHROMATIC_ARCHIVE_LOCATION: ./test-results
