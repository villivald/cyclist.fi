name: ci-e2e
on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        run: npm run build

      - name: Run E2E
        env:
          PORT: 4321
          CI: true
        run: npm run e2e -- --project=chromium --reporter=html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          retention-days: 30

  chromatic:
    name: Run Chromatic
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download Playwright test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: ./test-results

      - name: Build archive Storybook
        run: npm exec build-archive-storybook -- --output-dir=storybook-archive
        env:
          CI: "false"
          CHROMATIC_ARCHIVE_LOCATION: ./test-results

      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          storybookBuildDir: storybook-archive
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
